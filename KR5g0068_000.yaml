body:
  text: 龍虎精微論三要逹道篇六根歸道篇龍虎精微論粵若太易未分莫之名狀太極既始遂有混成中含真一之精實為天地之母四象因之而建立萬物由之以生成炎烈火中出飛龍之矯矯泓澄水底躍走虎以耽耽陰陽莫能測其情鬼神無以窺其迹聖人有作潛開造化之源學者精心遂啓希徴之旨則金丹之道可得而言且夫眇覿幽深祕在鉛火離宫有氣向甲乙以生華坎位騰精入庚辛而結粹金胎神室肇建丹臺聖母華池爰開藥祖所以陽爐陰鼎法天地之元規剛火柔符凝寒暄之大柄回旋八表依約五行取三百八十之卦爻循環火內盜四千三百之正氣來入鼎中春夏秋冬頃刻而更相代謝子午卯酉逡巡而不越準繩任二十四氣以推遷俾七十二候之羅絡促歲功於月內寒暑無差陷月候於日中弦望有則從子至已純陽用事而進陽符乃內陰而求外陽也自午至亥純陰方興而退陽火乃外陽而附內陰焉周流六虛往來上下水火運轉動靜無常故得龍虎相交向鴻濛而有象夫妻合體從恍忽以成形是以坎作陽男而居陰位陰中陽附故金虎見於水間遂為月魄離者陰女而處陽方陽中陰生乃汞龍出於火內故曰日魂至于神室範圍象如雞子兩弦相合一體混同爰從否泰之中承兹交感之氣養鄞鄂樹立根基以至凝然遂成神物其或抽添過度進退失期符火有差寒暑不應則陰陽乖殊四方成水旱之災天地分崩萬物有流離之變和氣由兹而不降真精自此而莫留蓋運火之失宜匪用藥之有異也必若辨鉛認汞識水知金躬受祕聞親傳大訣取黃芽於鉛內化出金田散白雪於砂間搆成神室中央作鼎法象乾坤四面行符循環日月陽升陰退陰進陽錯蟾光盛而金水成形兔影滅而龍虎伏體歲月既滿功用方神浸以澄波浴之寒夜半圭入口向五內以雲蒸一劑才終已金身而霞舉此得之者也夫鉛火之始終雖得其鉛復難其火每精思於至理固難測於玄機苟不從師終無自悟徴矣妙矣神哉聖哉若自得其真則不言而可信或終迷其趣必忠告而見疑遂有妄出胸襟恣為穿鑿依約經旨飾説虛談雖強名略同而至道殊邈竊呼二氣誑號靈砂以磂黃為陽鉛用水銀作陰汞亦運水火還設鼎爐徒成殷鮮之形可供藻繪之用而又桑霜雪水各見煎熬草汁木灰竟聞收採或以便液而鍊或以糞穢而燒或將古井之汙泉認為神水或取草頭之露顆喚作河車鍊鹹為鉛抽砂作汞或以金銀之合雜或將砂汞之調和五金平用於爐中八石同烹於鼎內如此則虛勞歲月枉費資財遂使白首成空死心神之不實丹臺莫到向淪謝以何逃此失之者也殊不知至藥者乃天地之極靈為出世之要道採陰陽五行之氣取日月四象之精自無形而入有形從有物而至無物死生永度變化無窮向雲漢以高躋與穹昊而齊久豈將凡朽之用可並神靈者哉愚竊慕長生深探至理雖莫窺其堂奧亦粗曉其津涯終冀獲遇高真恭聞寶訓證成妙道以拔塵籠常默默以為懷每兢兢而在念藏於絳府莫漏徴言今乃覼縷再三敷舒不已者豈敢評量於天道固非泄慢於天機其如著懷亦有所自蓋欲招同志養素之士結絶俗深識之流共棄浮榮相期巖谷耳復以詩一十首系之於末其一識汞知鉛辨火金還丹深旨杳難尋若將世上凡常物白首虛勞枉用心其二泓澄水底深藏虎烈火光中密有龍調燮陰陽無舛錯自然蟾彩入烏中其三五行妙用循環轉相賊相生變化成若遣世人皆會得便應傾國彩雲迎其四震龍張鬛欲騰方兌虎神威又捉將二氣混成歸一體可知金鼎道非常其五化女成男事可論轉南成北道彌尊人間無限神仙藥指與翻疑是誑言其六四千三百真精氣上帝潛移頃刻中火記盈編藏祕旨誰知年月日時同其七星堂獨照滿皇都萬里天河注玉湖碧浪騰波歸大海黑雲靉靆化玄珠其八朝元羽液頻將鍊莫把靈烏暗處舒往往求生多此用迷徒失路怨清虛其九癸水連天濟海涯庚辛産鍊木精華坎離二女調和聚同化相生共一家其十志操興功修寶殿碧霄池畔長鉛花復來再會成姻眷日日常般漸漸加莊老火候凡人欲行此周天火候先須絶嗜欲減食味若常潔食方為合宜也不可貪財逐利凡欲行持之時先行導引凡事略略為之要開關脈能引多般尤更良矣又勿使疲困致損精神殊不妙也導引大綱略云下項擺掣四肢以手大擺以足大踏步行又以一腳踏地一腳懸空向前踏空令響手托山勢以手交扠指掌仰上放脫手直上托以兩腳用力踏地少時拽弓勢以兩手左右挽如搜弓之勢又側身如射雕之勢左右為之又以兩手交抱項後搖上截身連頭動也腳膝亦要摩攏赤澤並乾浴更以手相摩熱尉氣海穴之上下亦握固兩手指歷歷令響然後叩齒集神又振天鼓三十六下以左右手按鼻左右是制七魄也又呼三魂名爽靈胎光幽精數遍或只一遍先閉定氣久然後呵遂出敗宿食穢氣又直舒展手足令氣出指梢又想青龍白虎朱雀玄武於前後左右黃氣罩身此即五臟真形然後息定意欵乃作用打爻陽爻每一爻以息定來去勻俟出息時留一半便閉息以意助取自己元氣元亦源也上至層環已上乃鼓住咽去聲下咽時取左邊下轉面向右咽入聲取三十六足如初行三兩歇了三十六亦可仍須想咽下田層環穿胃神口過入丹田却放氣出入再調息候又打一爻每三十六咽去聲下想時依上法過神口直入丹田中每咽下時令氣嗢嗢汩汩歷歷而作聲如此打盡六爻計合二百一十六數然後想一齊聚於丹田中將身左右搖動五七遍更以手摩氣海上下助之於十二時中陽時打陽爻陰時打陰爻打時須閉目萬慮俱絶不得鑯毫挂心卯酉二時屬沐浴不行若或以午後盡為陰子後盡為陽之時只是背著陰陽五行真的矣今須且依他此本午後五時行陰卦子後五時行陽卦所以此本中言午後行坤每一時一卦除數目在前本目共一百四十四是外其餘次第皆一般每一季一次起火燒之發火行徑一如君侯所燒法一般略而不書所行氣已是火候所燒滯濁也行一年小成二年中成三年變質六年六陰退六陽備名係仙籍九年可以超升初時須服餌以助之陰德以扶之淡默以養之同道一二以借之復不拘山林與城市而皆可居也不可借自己所著者鞋履衣冠與人恐損功力或依水靠林得為中若城樊𠪨市即其上耳夫莊老之本道德之源銘之佩之珍之守之自然成功也龍虎精微論
